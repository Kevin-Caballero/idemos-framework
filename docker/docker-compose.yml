# IDemos — Production Docker Compose
# Usage: docker compose -f docker/docker-compose.yml up --build -d

name: idemos

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-idemos}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-idemos}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s


  migration-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrations
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_NAME:     ${DB_NAME:-idemos}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure:3

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    env_file: ../.env
    environment:
      NODE_ENV:      production
      PORT:          "3000"
      RABBITMQ_URL:  amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully

  auth:
    build:
      context: ..
      dockerfile: docker/Dockerfile.auth
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV:      production
      PORT:          "3001"
      DB_HOST:       postgres
      RABBITMQ_URL:  amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV:      production
      PORT:          "3002"
      DB_HOST:       postgres
      RABBITMQ_URL:  amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully

  ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV:      production
      PORT:          "3003"
      DB_HOST:       postgres
      RABBITMQ_URL:  amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully

  etl:
    build:
      context: ..
      dockerfile: docker/Dockerfile.etl
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV:      production
      PORT:          "3004"
      DB_HOST:       postgres
      RABBITMQ_URL:  amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully

volumes:
  pgdata:
    name: idemos_pgdata
