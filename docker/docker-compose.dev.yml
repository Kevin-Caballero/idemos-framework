# IDemos — Dev Infrastructure (postgres + rabbitmq)

name: idemos-dev

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-idemos}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-idemos}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev:/root/.ollama
    environment:
      AI_MODEL: ${AI_MODEL:-llama3.2}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        echo 'Waiting for Ollama server...'
        until /bin/ollama list >/dev/null 2>&1; do sleep 1; done
        if /bin/ollama list | grep -q "$$AI_MODEL"; then
          echo "Model $$AI_MODEL already present."
        else
          echo "Pulling model $$AI_MODEL..."
          /bin/ollama pull $$AI_MODEL
          echo 'Model ready.'
        fi
        wait
    healthcheck:
      test: ["CMD-SHELL", "/bin/ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  pgdata_dev:
    name: idemos_pgdata_dev
  ollama_dev:
    name: idemos_ollama_dev
